name: Build Desktop Apps

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 构建平台
        required: true
        default: all
        type: choice
        options:
          - windows
          - mac
          - all
  push:
    tags:
      - "v*"

jobs:
  build-mac:
    if: github.event_name == 'push' || inputs.platform == 'mac' || inputs.platform == 'all'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=$(cat package.json | grep '"version"' | head -1 | awk -F: '{ print $2 }' | sed 's/[",]//g' | tr -d '[[:space:]]')
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Rosetta 2
        run: |
          if [ "$(uname -m)" = "arm64" ]; then
            echo "Installing Rosetta 2..."
            softwareupdate --install-rosetta --agree-to-license || true
          fi

      - name: Package macOS
        env:
          GIT_TAG: ${{ github.ref }}
        run: |
          if arch -x86_64 /usr/bin/true 2>/dev/null; then
            echo "✓ Rosetta 2 is working, can build x86_64"
          else
            echo "⚠ Warning: Rosetta 2 may not be available"
          fi
          bash scripts/package-mac.sh

      - name: Verify built workers
        run: |
          echo "Built workers:"
          ls -la resources/bin/darwin/ || echo "Directory not found"
          for f in resources/bin/darwin/watermark-worker-*; do
            if [ -f "$f" ]; then
              echo "Checking: $f"
              file "$f" || true
            fi
          done

      - name: Verify packaged app structure
        run: |
          set -e
          DMG_PATH=$(ls release/*.dmg | head -1)
          if [ -z "$DMG_PATH" ]; then
            echo "错误: 未找到 .dmg 文件" >&2
            exit 1
          fi
          echo "验证打包后的应用: $DMG_PATH"

          # 创建挂载点
          MOUNT_POINT="/tmp/watermark-verify-$RANDOM"
          mkdir -p "$MOUNT_POINT"

          # 挂载 dmg
          echo "挂载 dmg..."
          hdiutil attach "$DMG_PATH" -mountpoint "$MOUNT_POINT" -nobrowse -quiet

          # 查找 .app
          APP_PATH=$(find "$MOUNT_POINT" -name "*.app" -maxdepth 2 | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "错误: 未找到 .app" >&2
            hdiutil detach "$MOUNT_POINT" -quiet || true
            exit 1
          fi
          echo "找到应用: $APP_PATH"

          # 检查 Resources/bin 目录
          BIN_DIR="$APP_PATH/Contents/Resources/bin"
          echo "检查 bin 目录: $BIN_DIR"

          if [ ! -d "$BIN_DIR" ]; then
            echo "错误: bin 目录不存在" >&2
            echo "Contents/Resources 内容:"
            ls -la "$APP_PATH/Contents/Resources/" >&2
            hdiutil detach "$MOUNT_POINT" -quiet || true
            exit 1
          fi

          echo "bin 目录内容:"
          ls -la "$BIN_DIR"

          # 检查必需文件
          REQUIRED_FILES=(
            "watermark-worker-arm64"
            "ffmpeg-arm64"
            "ffmpeg-x64"
            "ffprobe-arm64"
            "ffprobe-x64"
          )

          # x86_64 worker 是可选的（取决于 Rosetta 2 可用性）
          OPTIONAL_FILES=(
            "watermark-worker-x64"
          )

          MISSING=0
          for file in "${REQUIRED_FILES[@]}"; do
            FILE_PATH="$BIN_DIR/$file"
            if [ -f "$FILE_PATH" ]; then
              SIZE=$(stat -f%z "$FILE_PATH" 2>/dev/null || stat -c%s "$FILE_PATH" 2>/dev/null || echo "0")
              echo "  ✓ $file (${SIZE} bytes)"
              # 检查文件大小
              if [ "$SIZE" -eq 0 ]; then
                echo "    ✗ 错误: 文件大小为 0" >&2
                MISSING=$((MISSING + 1))
              fi
            else
              echo "  ✗ $file (缺失)" >&2
              MISSING=$((MISSING + 1))
            fi
          done

          # 检查可选文件
          for file in "${OPTIONAL_FILES[@]}"; do
            FILE_PATH="$BIN_DIR/$file"
            if [ -f "$FILE_PATH" ]; then
              SIZE=$(stat -f%z "$FILE_PATH" 2>/dev/null || stat -c%s "$FILE_PATH" 2>/dev/null || echo "0")
              echo "  ✓ $file (${SIZE} bytes) (可选)"
            else
              echo "  ⚠ $file (缺失，但在 CI 环境下可接受)"
            fi
          done

          # 卸载 dmg
          hdiutil detach "$MOUNT_POINT" -quiet || true
          rm -rf "$MOUNT_POINT"

          if [ "$MISSING" -gt 0 ]; then
            echo "错误: $MISSING 个文件缺失或无效" >&2
            exit 1
          fi

          echo "✓ 打包验证通过"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-artifact
          path: release/*.dmg
          if-no-files-found: error

  build-win:
    if: github.event_name == 'push' || inputs.platform == 'windows' || inputs.platform == 'all'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -match '^refs/tags/v') {
            $VERSION = $env:GITHUB_REF -replace '^refs/tags/v', ''
          } else {
            $VERSION = (Get-Content package.json | ConvertFrom-Json).version
          }
          echo "VERSION=$VERSION" >> $env:GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prepare Windows binaries
        shell: pwsh
        run: |
          $BinDir = "resources\bin\win32"
          New-Item -ItemType Directory -Force -Path $BinDir | Out-Null
          Write-Host "=== 确保 bin 目录存在 ==="
          Write-Host "目录: $(Resolve-Path $BinDir)"

      - name: Package Windows
        shell: pwsh
        env:
          GIT_TAG: ${{ github.ref }}
        run: ./scripts/package-win.ps1

      - name: Verify built worker
        shell: pwsh
        run: |
          Write-Host "=== Verifying Windows Worker ==="
          $workerPath = "resources\bin\win32\watermark-worker.exe"
          if (Test-Path $workerPath) {
            Write-Host "✓ Worker found: $workerPath"
            $fileInfo = Get-Item $workerPath
            Write-Host "  Size: $($fileInfo.Length) bytes"
          } else {
            Write-Host "✗ Worker NOT found: $workerPath"
            Write-Host "Contents of resources\bin\win32:"
            Get-ChildItem -Path "resources\bin\win32" -Recurse -ErrorAction SilentlyContinue
          }

      - name: Verify packaged app structure
        shell: pwsh
        run: |
          Write-Host "=== 验证 Windows 打包结构 ==="

          # 查找 portable exe
          $portableExe = Get-ChildItem -Path "release" -Filter "*portable.exe" | Select-Object -First 1
          if (-not $portableExe) {
            Write-Host "错误: 未找到 portable exe" -ForegroundColor Red
            exit 1
          }

          Write-Host "找到 portable 版本: $($portableExe.FullName)"

          # 创建临时目录
          $tempDir = Join-Path $env:TEMP ("watermark-verify-" + [guid]::NewGuid().ToString())
          New-Item -ItemType Directory -Force -Path $tempDir | Out-Null

          $extracted = $false
          try {
            # 尝试用 7z 解压
            $sevenZip = "C:\Program Files\7-Zip\7z.exe"
            if (Test-Path $sevenZip) {
              & $sevenZip x "$($portableExe.FullName)" -o"$tempDir" -y | Out-Null
              $extracted = $true
            } else {
              # 尝试用 PowerShell Expand-Archive
              try {
                Expand-Archive -Path "$($portableExe.FullName)" -DestinationPath "$tempDir" -Force
                $extracted = $true
              } catch {
                Write-Host "无法解压 portable 版本，尝试检查文件大小..." -ForegroundColor Yellow
              }
            }

            if (-not $extracted) {
              # 无法解压，至少检查文件大小
              $size = $portableExe.Length
              Write-Host "文件大小: $size bytes"
              if ($size -lt 100000000) {
                Write-Host "错误: 文件大小异常小，可能打包不完整" -ForegroundColor Red
                exit 1
              }
              Write-Host "警告: 无法验证内部结构，但文件大小正常" -ForegroundColor Yellow
              exit 0  # 文件大小正常，不失败
            }

            # 检查解压后的目录
            $binDir = Join-Path $tempDir "resources\app\bin"
            if (Test-Path $binDir) {
              Write-Host "找到 bin 目录: $binDir"
              Get-ChildItem -Path $binDir | ForEach-Object {
                Write-Host "  $($_.Name) ($($_.Length) bytes)"
              }

              # 检查必需文件
              $requiredFiles = @("watermark-worker.exe", "ffmpeg.exe", "ffprobe.exe")
              $missing = 0
              foreach ($file in $requiredFiles) {
                $filePath = Join-Path $binDir $file
                if (Test-Path $filePath) {
                  $info = Get-Item $filePath
                  if ($info.Length -eq 0) {
                    Write-Host "  ✗ $file (大小为 0)" -ForegroundColor Red
                    $missing++
                  } else {
                    Write-Host "  ✓ $file ($($info.Length) bytes)"
                  }
                } else {
                  Write-Host "  ✗ $file (缺失)" -ForegroundColor Red
                  $missing++
                }
              }

              if ($missing -gt 0) {
                Write-Host "错误: $missing 个文件缺失或无效" -ForegroundColor Red
                exit 1
              }
            } else {
              Write-Host "错误: 无法找到 bin 目录，打包结构可能有问题" -ForegroundColor Red
              exit 1
            }
          } finally {
            Remove-Item -Recurse -Force $tempDir -ErrorAction SilentlyContinue
          }

          Write-Host "✓ Windows 打包验证完成"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-artifacts
          path: |
            release/*-win-x64.exe
            release/*-portable.exe
          if-no-files-found: error

  create-release:
    needs: [build-mac, build-win]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Display artifacts
        run: |
          echo "Downloaded artifacts:"
          find artifacts -type f -name "*.dmg" -o -name "*.exe" | while read f; do
            echo "  - $f ($(stat -c%s "$f" | numfmt --to=iec))"
          done

      - name: Generate Release Notes
        id: release-notes
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}

          # 获取当前 tag 和上一个 tag 之间的提交
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")

          if [ -n "$PREVIOUS_TAG" ]; then
            COMMIT_RANGE="${PREVIOUS_TAG}..HEAD"
          else
            COMMIT_RANGE="$(git rev-list --max-parents=0 HEAD)..HEAD"
          fi

          # 生成发布说明
          cat > release_notes.md << EOF
          ## 🎉 批量视频水印处理大师 v${VERSION}

          ### 📦 安装包

          | 平台 | 文件 | 说明 |
          |------|------|------|
          | **macOS** | BatchWatermarkMaster-${VERSION}-mac-universal.dmg | Intel & Apple Silicon 通用 |
          | **Windows** | BatchWatermarkMaster-${VERSION}-win-x64.exe | 安装程序 |
          | **Windows** | BatchWatermarkMaster-${VERSION}-portable.exe | 便携版（免安装） |

          ### 🔧 系统要求

          - **macOS**: macOS 11.0 或更高版本 (Intel/Apple Silicon)
          - **Windows**: Windows 10/11 64位

          ### ✨ 更新内容

          EOF

          # 添加最近提交
          echo "#### 最近更新:" >> release_notes.md
          git log ${COMMIT_RANGE} --pretty=format:"- %s (@%an)" --reverse >> release_notes.md
          echo "" >> release_notes.md

          cat >> release_notes.md << EOF

          ### 🚀 功能特性

          - ✂️ 批量视频去水印（OpenCV 智能修复）
          - 🎨 贴纸覆盖（8 种预设样式）
          - 📁 批量处理（3-10 个视频）
          - 🎯 ROI 区域框选
          - 💻 本地处理，无需上传云端

          ---
          **完整更新日志**: [CHANGELOG.md](./CHANGELOG.md)
          EOF

          cat release_notes.md

      - name: Sanitize asset filenames (strip non-ASCII for GitHub Release)
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          set -e
          # 将 productName 中文前缀的安装包改为 ASCII 命名，
          # 避免 softprops/action-gh-release@v1 把中文吃掉导致下载 404。
          # UI 显示的 productName 仍保留中文，不受此步骤影响。
          SAFE_NAME="BatchWatermarkMaster"
          cd artifacts
          for art in mac-artifact win-artifacts; do
            if [ -d "$art" ]; then
              cd "$art"
              # 任意以非 ASCII 起头的 *.dmg / *.exe 文件，重命名为 ASCII
              for f in *.dmg *.exe; do
                [ -e "$f" ] || continue
                case "$f" in
                  *-mac-universal.dmg)
                    mv -v "$f" "${SAFE_NAME}-${VERSION}-mac-universal.dmg"
                    ;;
                  *-win-x64.exe)
                    mv -v "$f" "${SAFE_NAME}-${VERSION}-win-x64.exe"
                    ;;
                  *-portable.exe)
                    mv -v "$f" "${SAFE_NAME}-${VERSION}-portable.exe"
                    ;;
                  *)
                    echo "Skipping unrecognized file: $f"
                    ;;
                esac
              done
              cd ..
            fi
          done
          echo "--- Sanitized layout ---"
          find . -type f -name "*.dmg" -o -name "*.exe" | sort

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: v${{ steps.version.outputs.VERSION }}
          body_path: release_notes.md
          files: |
            artifacts/mac-artifact/*.dmg
            artifacts/win-artifacts/*.exe
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
